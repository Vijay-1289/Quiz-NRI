<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Interview Ready</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="old_style.css">
    <link rel="stylesheet" href="auth.css">
</head>

<body class="auth-body">
    <header class="auth-header container">
        <a href="old_index.html" class="logo">
            <div class="logo-icon">
                <i class="ph-fill ph-graduation-cap"></i>
            </div>
            <span>Interview Ready</span>
        </a>
        <div class="auth-header-right">
            <span>Already have an account?</span>
            <a href="login.html" class="btn btn-light-gray ml-3">Sign In</a>
        </div>
    </header>

    <main class="auth-main">
        <div class="auth-card">
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Join Interview Ready to ace your next career move</p>

            <button class="btn btn-outline btn-google">
                <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" alt="Google"
                    class="google-icon">
                Sign up with Google
            </button>

            <div class="auth-divider">
                <span>OR</span>
            </div>

            <form class="auth-form" action="old_index.html">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-icon-wrapper">
                        <i class="ph-fill ph-user"></i>
                        <input type="text" placeholder="John Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-icon-wrapper">
                        <i class="ph-fill ph-envelope"></i>
                        <input type="email" placeholder="john@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-icon-wrapper">
                        <i class="ph-fill ph-lock-key"></i>
                        <input type="password" placeholder="••••••••" required>
                        <button type="button" class="eye-btn"><i class="ph-fill ph-eye"></i></button>
                    </div>
                </div>

                <div class="form-checkbox">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the <strong>Terms of Service</strong> and <strong>Privacy
                            Policy</strong>.</label>
                </div>

                <button type="submit" class="btn btn-dark btn-submit">Create Account <i class="ph-bold ph-arrow-right"
                        style="margin-left: 4px;"></i></button>
            </form>
        </div>
    </main>

    <footer class="auth-footer container">
        <div class="footer-bottom-auth">
            <p>&copy; 2024 Interview Ready Platform. All rights reserved.</p>
        </div>
    </footer>
</body>

</html>
